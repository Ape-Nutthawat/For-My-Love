<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For My Love ❤️</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet"/>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css"/>
</head>
<audio id="bgm" loop>
  <source src="./smild.mp3" type="audio/mpeg">
</audio>
<body>

  <!-- Background Canvas -->
  <canvas id="heartCanvas"></canvas>
  <canvas id="sakuraCanvas"></canvas>

  <!-- Loading -->
  <div class="loading">
    <div class="loader"></div>
    <h2>Loading Memories...</h2>
  </div>

  <!-- HERO -->
  <section id="hero">
    <h1>Happy 6 Months ❤️</h1>
    <p id="typing"></p>
    <button id="start">Open My Heart</button>
  </section>

  <!-- LETTER -->
  <section id="letterSection" class="hidden">
    <div class="envelope" id="envelope">

      <div class="envelope-back"></div>
      <div class="flap"></div>

      <div class="letter">
        <h2>ถึงคนพิเศษของเค้า🐰</h2>
        <p id="letterText"></p>
      </div>

    </div>

    <button id="openBtn">เปิดจดหมาย 💌</button>
  </section>

  <!-- GALLERY -->
  <section id="gallery" class="hidden">
    <h2>Our Memories</h2>

    <div class="grid">
      <img src="images/1.jpg" alt="memory 1"/>
      <img src="images/2.jpg" alt="memory 2"/>
      <img src="images/3.jpg" alt="memory 3"/>
      <img src="images/4.jpg" alt="memory 4"/>
      <img src="images/5.jpg" alt="memory 5"/>
      <img src="images/6.jpg" alt="memory 6"/>
      <img src="images/7.jpg" alt="memory 7"/>
      <img src="images/8.jpg" alt="memory 8"/>
    </div>
  </section>

  <!-- JS (IMPORTANT ORDER) -->
  <script src="js/app.js"></script>
  <script src="js/heart.js"></script>
  <script src="js/sakura.js"></script>

</body>
</html>
